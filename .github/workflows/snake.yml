name: Generate Contribution Snake

# Trigger daily at midnight UTC and allow manual runs
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  # Ensures Node.js 24 is used for JavaScript-based actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-snake:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Generate Contribution Snake SVG (GitHub dark theme)
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: nilanjanajui
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Step 3: Deploy generated SVG to the 'output' branch
      - name: Deploy Snake to 'output' branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_PAT }}
          publish_dir: dist
          publish_branch: output
          allow_empty_commit: true
          keep_files: true
          commit_message: "Auto-update Contribution Snake"
